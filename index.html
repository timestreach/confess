<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --accent-color: #ff4d6d;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        ::selection {
            background-color: rgba(255, 77, 109, 0.3);
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Ambient Glow Animations */
        @keyframes pulseSlow {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.25; transform: translate(-50%, -50%) scale(1.05); }
        }

        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background-color: var(--accent-color);
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            animation: pulseSlow 6s infinite ease-in-out;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        @media (min-width: 768px) {
            .ambient-glow {
                width: 500px;
                height: 500px;
                filter: blur(150px);
            }
        }

        .vignette-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, var(--bg-color) 100%);
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }

        /* Cinematic Fade In Effects */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to { width: 3rem; opacity: 1; }
        }

        .fade-in-element {
            opacity: 0;
            animation: fadeIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .line-animate {
            opacity: 0;
            animation: expandWidth 1s ease-out forwards;
        }

        /* Transitions */
        .step-container {
            transition: opacity 0.8s ease-in-out;
        }
        
        .opacity-0 {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Buttons */
        .btn-primary {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .btn-primary:hover {
            border-color: rgba(255, 77, 109, 0.5);
            background-color: rgba(255, 77, 109, 0.1);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.2);
        }
        
        .btn-ghost {
            color: #9ca3af;
            background-color: transparent;
            border: 1px solid transparent;
        }
        .btn-ghost:hover {
            color: white;
        }

        /* SVG Icons */
        .icon {
            width: 1rem;
            height: 1rem;
            transition: transform 0.3s ease;
        }
        .group:hover .icon-right {
            transform: translateX(4px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <div class="ambient-glow"></div>
    <div class="vignette-overlay"></div>

    <main id="app-container" class="relative z-10 w-full max-w-2xl px-6 md:px-12 flex flex-col items-center text-center step-container"></main>

    <aside id="admin-container" class="fixed inset-0 z-50 bg-[#0a0a0a] overflow-y-auto opacity-0 pointer-events-none transition-opacity duration-500 hidden">
        <div class="min-h-screen p-6 md:p-12">
            <div class="max-w-4xl mx-auto" id="admin-content">
                </div>
        </div>
    </aside>

    <button id="admin-trigger" class="fixed bottom-4 right-4 w-6 h-6 rounded-full opacity-10 hover:opacity-50 transition-opacity z-40 flex items-center justify-center" title="Admin Dashboard">
        <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your specific Firebase keys
        const firebaseConfig = {
            apiKey: "AIzaSyDU7YeBrosMN2BOy0UR-v_z-_NEslkboRg",
            authDomain: "for-her13.firebaseapp.com",
            projectId: "for-her13",
            storageBucket: "for-her13.firebasestorage.app",
            messagingSenderId: "664218007363",
            appId: "1:664218007363:web:53a9e31752ddc3276ea1f6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Single database document to track her live progress
        const docRef = doc(db, 'tracking', 'live_visit');

        // --- State ---
        let currentStep = 1;
        let maybeNotClicked = false;
        let isTransitioning = false;

        // --- DOM Elements ---
        const appContainer = document.getElementById('app-container');
        const adminContainer = document.getElementById('admin-container');
        const adminContent = document.getElementById('admin-content');
        const adminTrigger = document.getElementById('admin-trigger');

        const chevronRight = `<svg class="icon icon-right" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`;

        function createFadeText(text, delay, classes = "") {
            return `<div class="fade-in-element ${classes}" style="animation-delay: ${delay}s">${text}</div>`;
        }

        function createButton(text, delay, onClickCode, variant = "primary", showIcon = true) {
            const variantClass = variant === 'primary' ? 'btn-primary' : 'btn-ghost';
            const iconHtml = showIcon ? chevronRight : '';
            return `
                <div class="fade-in-element" style="animation-delay: ${delay}s">
                    <button onclick="${onClickCode}" class="group relative px-6 py-3 rounded-full text-sm sm:text-base font-medium transition-all duration-300 flex items-center justify-center gap-2 ${variantClass}">
                        ${text} ${iconHtml}
                    </button>
                </div>
            `;
        }

        function renderStep() {
            let html = '<div class="space-y-6 flex flex-col items-center w-full">';

            if (currentStep === 1) {
                html += createFadeText('Hey…', 0.3, 'font-serif text-3xl md:text-4xl tracking-wide mb-4');
                html += createFadeText('This is not random.', 1.5, 'text-gray-400 font-light text-base md:text-lg');
                html += createFadeText('This is something I made,<br/>just for you.', 2.5, 'text-gray-400 font-light text-base md:text-lg mb-8 leading-relaxed');
                html += createButton('Continue', 4.0, 'goToNextStep()', 'primary');
            } 
            else if (currentStep === 2) {
                if (!maybeNotClicked) {
                    html += createFadeText('Before you go further…', 0.3, 'font-serif text-3xl md:text-4xl tracking-wide mb-4');
                    html += createFadeText('Are you sure you want to see this?', 1.5, 'text-gray-400 font-light text-base md:text-lg mb-10');
                    html += `
                        <div class="flex flex-col sm:flex-row gap-4 items-center mt-8 w-full justify-center">
                            ${createButton("Yes, I'm sure", 2.5, "goToNextStep()", "primary", false)}
                            ${createButton("Maybe not", 3.0, "handleMaybeNot()", "ghost", false)}
                        </div>
                    `;
                } else {
                    html += createFadeText('That’s okay.', 0.2, 'font-serif text-3xl md:text-4xl tracking-wide mb-4');
                    html += createFadeText('But some things are meant<br/>to be seen at least once.', 1.2, 'text-gray-400 font-light text-base md:text-lg mb-10 leading-relaxed');
                    html += createButton('Continue', 2.5, 'goToNextStep()', 'primary');
                }
            }
            else if (currentStep === 3) {
                html += createFadeText('In a world full of noise…', 0.3, 'font-serif text-3xl md:text-4xl tracking-wide mb-4');
                html += createFadeText('some people just stand out.', 1.5, 'text-gray-400 font-light text-base md:text-lg');
                html += createFadeText('Not because they try,<br/>but because they are different.', 3.0, 'text-gray-400 font-light text-base md:text-lg mb-10 leading-relaxed');
                html += createButton('Next', 4.5, 'goToNextStep()', 'primary');
            }
            else if (currentStep === 4) {
                html += createFadeText('So I thought…', 0.3, 'font-serif text-3xl md:text-4xl tracking-wide mb-6');
                html += createFadeText('instead of saying this in a normal way,', 1.5, 'text-gray-400 font-light text-base md:text-lg');
                html += createFadeText('I’d create something different.', 2.5, 'text-gray-400 font-light text-base md:text-lg');
                html += createFadeText('Because you’re not someone ordinary.', 4.0, 'font-serif italic text-gray-300 text-lg md:text-xl mt-4 mb-10');
                
                html += `<div class="h-px bg-white/10 my-4 line-animate" style="animation-delay: 5.5s;"></div>`;

                html += createFadeText('I wanted you to know…', 6.0, 'font-serif text-xl md:text-2xl tracking-wide text-white mt-8 mb-2');
                html += createFadeText('you’ve been on my mind.', 7.5, 'font-medium tracking-wide text-[var(--accent-color)] text-lg md:text-xl drop-shadow-[0_0_10px_rgba(255,77,109,0.3)] mb-12');
                html += createButton('One last thing', 9.0, 'goToNextStep()', 'primary');
            }
            else if (currentStep === 5) {
                html += createFadeText('No pressure.', 0.3, 'text-gray-400 font-light text-base md:text-lg');
                html += createFadeText('No expectations.', 1.3, 'text-gray-400 font-light text-base md:text-lg');
                
                html += createFadeText('Just something real.', 2.8, 'font-serif text-xl md:text-2xl tracking-wide text-white my-8');

                html += createFadeText('If this made you smile even a little…<br/>then it was worth it.', 4.5, 'text-gray-400 font-light text-base md:text-lg leading-relaxed mb-12');

                html += createFadeText(`
                    <span class="font-serif italic text-lg md:text-xl text-white/80 border-b border-[#ff4d6d]/30 pb-1 pr-2 inline-block">
                        — from someone who noticed you
                    </span>
                `, 6.5, 'mt-12');
            }

            html += '</div>';
            appContainer.innerHTML = html;
        }

        // Silent Database Sync Function
        function syncToDatabase(step) {
            setDoc(docRef, {
                maxStepReached: step,
                lastActive: new Date().toLocaleTimeString()
            }, { merge: true }).catch(err => console.log("DB sync error (safe to ignore):", err));
        }

        window.goToNextStep = function() {
            if (isTransitioning) return;
            isTransitioning = true;
            
            appContainer.classList.add('opacity-0');
            
            setTimeout(() => {
                currentStep++;
                maybeNotClicked = false;
                
                // Sync progress to Firebase in the background
                syncToDatabase(currentStep);
                
                renderStep();
                appContainer.classList.remove('opacity-0');
                isTransitioning = false;
            }, 800);
        };

        window.handleMaybeNot = function() {
            if (isTransitioning) return;
            isTransitioning = true;
            
            appContainer.classList.add('opacity-0');
            
            setTimeout(() => {
                maybeNotClicked = true;
                renderStep();
                appContainer.classList.remove('opacity-0');
                isTransitioning = false;
            }, 800);
        };

        function renderAdminDashboard(dbStep, dbTime) {
            const lockIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--accent-color)]"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
            const activityIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`;
            const clockIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;

            const isComplete = dbStep === 5 
                ? `<p class="text-xs text-[#ff4d6d]/80 mt-2 font-medium">✨ Full Experience Completed</p>` 
                : '';

            adminContent.innerHTML = `
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 md:mb-12 border-b border-white/10 pb-6 gap-4">
                    <div>
                        <h1 class="font-serif text-2xl md:text-3xl flex items-center gap-3">
                            ${lockIcon} Remote Tracker
                        </h1>
                        <p class="text-gray-400 mt-2 font-light text-sm md:text-base">Live Firebase Connection Active.</p>
                    </div>
                    <button onclick="closeAdmin()" class="px-4 py-2 rounded-full border border-white/10 hover:bg-white/5 transition-colors text-sm shrink-0">
                        Back to Experience
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8">
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">${activityIcon}</div>
                        <p class="text-gray-400 text-sm font-medium mb-1 relative z-10">Her Live Progress</p>
                        <p class="text-3xl md:text-4xl font-serif text-[var(--accent-color)] relative z-10">Step ${dbStep || 1} <span class="text-lg text-gray-500">/ 5</span></p>
                        ${isComplete}
                    </div>

                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">${clockIcon}</div>
                        <p class="text-gray-400 text-sm font-medium mb-1 relative z-10">Last Active Time</p>
                        <p class="text-xl md:text-2xl font-serif mt-2 relative z-10">${dbTime || '--:--:--'}</p>
                    </div>
                </div>
            `;
        }

        adminTrigger.addEventListener('click', () => {
            adminContainer.classList.remove('hidden');
            setTimeout(() => {
                adminContainer.classList.remove('opacity-0');
                adminContainer.classList.add('pointer-events-auto');
            }, 10);

            // Listen to Firebase Live Updates!
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    renderAdminDashboard(data.maxStepReached, data.lastActive);
                } else {
                    renderAdminDashboard(1, "Not opened yet");
                }
            });
        });

        window.closeAdmin = function() {
            adminContainer.classList.add('opacity-0');
            adminContainer.classList.remove('pointer-events-auto');
            setTimeout(() => {
                adminContainer.classList.add('hidden');
            }, 500);
        };

        // Render page instantly, log step 1 to database
        window.onload = function() {
            renderStep();
            syncToDatabase(1);
        };
    </script>
</body>
</html>
