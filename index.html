<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        .fade-in { opacity: 0; transition: opacity 0.8s ease-in-out; }
        .visible { opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-[#0f0f0f]">

    <!-- Main Message Container -->
    <div id="app-container" class="w-full max-w-2xl px-6 md:px-12 flex flex-col items-center text-center fade-in visible">
        <!-- Content will be injected here -->
    </div>

    <!-- Hidden Admin Trigger -->
    <button id="admin-trigger" class="fixed bottom-4 right-4 w-6 h-6 rounded-full opacity-10 hover:opacity-100 transition-opacity z-50 flex items-center justify-center" title="Admin">
        <div class="w-2 h-2 bg-white rounded-full"></div>
    </button>

    <!-- Admin Dashboard -->
    <div id="admin-container" class="fixed inset-0 bg-black/95 text-white p-10 z-[60] hidden opacity-0 transition-opacity duration-500 overflow-y-auto">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl mb-8 font-serif">Creator Dashboard</h1>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/10 p-6 rounded-2xl"><p class="text-gray-400 text-sm">Max Step Reached</p><p id="admin-step" class="text-4xl mt-2">1</p></div>
                <div class="bg-white/10 p-6 rounded-2xl"><p class="text-gray-400 text-sm">Status</p><p id="admin-status" class="text-lg mt-2 text-green-400">Loading...</p></div>
            </div>
            <button onclick="document.getElementById('admin-container').classList.add('hidden')" class="px-6 py-3 bg-white text-black rounded-full font-medium">Back to Experience</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU7YeBrosMN2BOy0UR-v_z-_NEslkboRg",
            authDomain: "for-her13.firebaseapp.com",
            projectId: "for-her13",
            storageBucket: "for-her13.firebasestorage.app",
            messagingSenderId: "664218007363",
            appId: "1:664218007363:web:53a9e31752ddc3276ea1f6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const docRef = doc(db, 'artifacts', 'for-her13', 'public', 'data', 'tracking', 'her_visit_01');

        let currentStep = 1;
        const appContainer = document.getElementById('app-container');

        const steps = {
            1: { title: "Hey…", text: "This is not random. This is something I made, just for you.", btn: "Continue" },
            2: { title: "Before you go further…", text: "Are you sure you want to see this?", btn: "Yes, I'm sure" },
            3: { title: "In a world full of noise…", text: "some people just stand out. Not because they try, but because they are different.", btn: "Next" },
            4: { title: "So I thought…", text: "I’d create something different. I wanted you to know… you’ve been on my mind.", btn: "One last thing" },
            5: { title: "Just something real.", text: "If this made you smile even a little… then it was worth it. — from someone who noticed you", btn: null }
        };

        function renderStep() {
            const s = steps[currentStep];
            appContainer.innerHTML = `
                <h1 class="text-4xl md:text-5xl font-serif mb-6">${s.title}</h1>
                <p class="text-lg md:text-xl text-gray-400 mb-10 leading-relaxed">${s.text}</p>
                ${s.btn ? `<button onclick="window.goToNextStep()" class="px-8 py-4 bg-white text-black rounded-full font-medium hover:scale-105 transition-transform">${s.btn}</button>` : ""}
            `;
        }

        window.goToNextStep = async () => {
            currentStep++;
            renderStep();
            try {
                await setDoc(docRef, { maxStepReached: currentStep, lastActive: new Date().toLocaleTimeString() }, { merge: true });
            } catch (e) { console.error(e); }
        };

        // IMMEDIATELY render, do not wait for Firebase
        renderStep();

        // Background Firebase sync
        signInAnonymously(auth).then(() => {
            document.getElementById('admin-status').innerText = "Connected";
            onSnapshot(docRef, (d) => {
                if(d.exists()) document.getElementById('admin-step').innerText = d.data().maxStepReached;
            });
        });

        document.getElementById('admin-trigger').onclick = () => {
            document.getElementById('admin-container').classList.remove('hidden');
            setTimeout(() => document.getElementById('admin-container').classList.remove('opacity-0'), 10);
        };
    </script>
</body>
</html>
